<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas</title>
<link rel="icon" type="image/png" href="https://files.catbox.moe/3y9kll.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--blue:#1e90ff;
--blue-bright:#4dabff;
--blue-dim:#0a4f99;
--bg:#030d1a;
--panel-border:#162b44;
--text:#c8dff0;
--text-dim:#4a7fa5;
--text-mid:#7aaccc;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,144,255,0.035) 1px,transparent 1px),linear-gradient(90deg,rgba(30,144,255,0.035) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 35%,rgba(30,144,255,0.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(0,70,160,0.06) 0%,transparent 50%);pointer-events:none;z-index:0}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 64px;background:rgba(3,13,26,0.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(30,144,255,0.1)}
.nav-logo{font-family:'Rajdhani',sans-serif;font-size:1.55rem;font-weight:700;letter-spacing:0.18em;color:#fff;text-transform:uppercase;display:flex;align-items:center;gap:10px;user-select:none;cursor:pointer}
.nav-logo-img{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.nav-center{display:flex;gap:4px}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-link{background:transparent;border:none;color:var(--text-dim);font-family:'Exo 2',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:9px 18px;cursor:pointer;border-radius:4px;transition:color 0.25s;position:relative}
.nav-link::after{content:'';position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:0;height:1.5px;background:var(--blue);border-radius:2px;transition:width 0.3s cubic-bezier(0.4,0,0.2,1)}
.nav-link:hover{color:var(--text)}
.nav-link:hover::after,.nav-link.active::after{width:50%}
.nav-link.active{color:var(--blue)}
.nav-link.special{color:#f0b429}
.nav-link.special::after{background:#f0b429}
.nav-link.special:hover{color:#ffd060}
