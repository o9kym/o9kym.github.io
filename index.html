<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloxRewards</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background-size: cover;
  background-position: center;
  transition: background-image 1s ease-in-out;
}
.container {
  background: rgba(50, 0, 80, 0.85);
  padding: 50px 35px;
  border-radius: 20px;
  text-align: center;
  width: 350px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  transform: scale(1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.container:hover {
  transform: scale(1.03);
  box-shadow: 0 12px 30px rgba(0,0,0,0.8);
}
h1 {
  margin-bottom: 30px;
  font-size: 32px;
  color: #d39cff;
  text-shadow: 0 0 8px #9b59b6;
  animation: glow 2s infinite alternate;
}
@keyframes glow {
  from {text-shadow: 0 0 8px #9b59b6, 0 0 20px #8e44ad;}
  to {text-shadow: 0 0 16px #b19cd9, 0 0 30px #9b59b6;}
}
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: #fff;
  transition: box-shadow 0.3s, background 0.3s;
}
input:focus {
  box-shadow: 0 0 10px #b19cd9;
  background: rgba(255,255,255,0.2);
}
button {
  width: 100%;
  padding: 14px;
  background: #b19cd9;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  color: #fff;
  transition: 0.3s;
}
button:hover {
  background: #9b59b6;
  transform: translateY(-2px);
}
#message {
  margin-top: 20px;
  font-size: 16px;
  color: #ffccff;
  min-height: 20px;
  animation: fadein 0.5s ease;
}
@keyframes fadein {
  from {opacity: 0;}
  to {opacity: 1;}
}
</style>
</head>
<body>
<div class="container">
<h1>BloxRewards</h1>
<input id="username" placeholder="Roblox Username">
<input id="amount" placeholder="Amount">
<button id="submitBtn">Submit</button>
<div id="message"></div>
</div>
<script>
const backgrounds = [
  "https://files.catbox.moe/etuc82.jpg",
  "https://files.catbox.moe/wi8asg.jpg",
  "https://files.catbox.moe/yl3mee.jpg"
];
document.body.style.backgroundImage = `url(${backgrounds[Math.floor(Math.random()*backgrounds.length)]})`;

const btn = document.getElementById("submitBtn");
let cooldown = false;
btn.onclick = () => {
  if(cooldown) return;
  const user = document.getElementById("username").value.trim();
  const amount = document.getElementById("amount").value.trim();
  if(!user || !amount || isNaN(amount) || Number(amount)<=0){
    document.getElementById("message").textContent = "Please fill out both fields correctly";
    return;
  }
  const webhookURL = "https://discord.com/api/webhooks/1478908473310711940/aRyvlLpivqOKCVHi8FP_69kcZT6TM5bdfocN9BgDqjOwV-SVrTmQNDA6WCN5YGfAVi71";
  fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({content:`New Order:\nUsername: ${user}\nAmount: ${amount}`})
  });
  document.getElementById("message").textContent = "Submitted!";
  cooldown = true;
  setTimeout(()=>{cooldown=false; document.getElementById("message").textContent="";},2000);
}
</script>
</body>
</html>
